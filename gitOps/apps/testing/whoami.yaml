apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whoami
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "40"
spec:
  project: default

  source:
    repoURL: https://github.com/Macsok/homeLAB.git
    targetRevision: main
    path: gitOps/infra/whoami

  destination:
    server: https://kubernetes.default.svc
    namespace: whoami

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true